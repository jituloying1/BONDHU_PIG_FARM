<!DOCTYPE html>
<html>
<head>
<title>Job Application Form</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:Arial;
background:#f2f2f2;
}

.container{
width:500px;
margin:auto;
background:white;
padding:20px;
margin-top:40px;
border-radius:10px;
box-shadow:0 0 10px gray;
}

h2{
text-align:center;
}

input,select{
width:100%;
padding:8px;
margin-top:5px;
margin-bottom:15px;
}

button{
padding:10px;
background:green;
color:white;
border:none;
width:100%;
font-size:16px;
cursor:pointer;
}

.preview{
display:none;
}

img{
width:120px;
margin-top:10px;
}

</style>
</head>

<body>

<div class="container">

<h2>Job Application Form</h2>

<div id="formPage">

<label>Name</label>
<input type="text" id="name">

<label>Father Name</label>
<input type="text" id="father">

<label>Mother Name</label>
<input type="text" id="mother">

<label>Email</label>
<input type="email" id="email">

<label>Phone Number</label>
<input type="text" id="phone">

<label>Aadhar Number</label>
<input type="text" id="adhar">

<label>Date of Birth</label>
<input type="date" id="dob">

<label>Apply Date</label>
<input type="date" id="applydate">

<label>Qualification</label>
<select id="qualification">

<option>10th</option>
<option>XI</option>
<option>XII</option>
<option>BA</option>
<option>BSC</option>
<option>BCA</option>
<option>BCOM</option>
<option>MA</option>
<option>MPHIL</option>
<option>PHD</option>

</select>

<label>Passport Size Photo</label>
<input type="file" id="photo" accept="image/*">

<label>Signature</label>
<input type="file" id="sign" accept="image/*">

<label>Admit Card Upload</label>
<input type="file" id="admit">

<label>Marksheet Upload</label>
<input type="file" id="marksheet">

<label>Extra Supporting Document</label>
<input type="file" id="doc">

<label>
<input type="checkbox" id="declaration">
I declare that the information given above is correct.
</label>

<button onclick="previewData()">Preview</button>

</div> 
  <script>
function doPost(e) {

var sheet = SpreadsheetApp.getActiveSpreadsheet().getSheetByName("Sheet1");

// PUT YOUR GOOGLE DRIVE FOLDER ID HERE
var folder = DriveApp.getFolderById("PASTE_FOLDER_ID_HERE");

var data = JSON.parse(e.postData.contents);


// FUNCTION TO SAVE FILE
function saveFile(base64Data, fileName){

if(!base64Data) return "";

var parts = base64Data.split(",");
var contentType = parts[0].match(/:(.*?);/)[1];
var bytes = Utilities.base64Decode(parts[1]);

var blob = Utilities.newBlob(bytes, contentType, fileName);
var file = folder.createFile(blob);

return file.getUrl();

}


// SAVE FILES
var photoLink = saveFile(data.photo, "photo_"+data.name);
var signLink = saveFile(data.sign, "sign_"+data.name);
var admitLink = saveFile(data.admit, "admit_"+data.name);
var marksheetLink = saveFile(data.marksheet, "marksheet_"+data.name);
var docLink = saveFile(data.doc, "doc_"+data.name);


// SAVE DATA TO SHEET
sheet.appendRow([
data.name,
data.father,
data.mother,
data.email,
data.phone,
data.adhar,
data.dob,
data.applydate,
data.qualification,
photoLink,
signLink,
admitLink,
marksheetLink,
docLink
]);


return ContentService.createTextOutput(
JSON.stringify({
status:"success"
})
).setMimeType(ContentService.MimeType.JSON);

}
  <script>


}
</script>
</body>
</html>
