<!DOCTYPE html>
<html>
<head>
<title>Job Application System</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:Arial;
background:#f4f4f4;
}

.container{
width:500px;
margin:auto;
background:white;
padding:20px;
margin-top:30px;
border-radius:10px;
box-shadow:0 0 10px gray;
}

h2{
text-align:center;
}

input,select{
width:100%;
padding:8px;
margin-top:5px;
margin-bottom:15px;
}

button{
width:100%;
padding:12px;
background:#007bff;
color:white;
border:none;
font-size:16px;
cursor:pointer;
border-radius:5px;
}

button:hover{
background:#0056b3;
}

</style>
</head>

<body>

<div class="container">

<h2>Job Application Form</h2>

<form id="jobForm">

<label>Name</label>
<input type="text" name="name" required>

<label>Father Name</label>
<input type="text" name="father" required>

<label>Mother Name</label>
<input type="text" name="mother">

<label>Email</label>
<input type="email" name="email" required>

<label>Phone Number</label>
<input type="text" name="phone" required>

<label>Aadhar Number</label>
<input type="text" name="adhar">

<label>Date of Birth</label>
<input type="date" name="dob">

<label>Qualification</label>

<select name="qualification">
<option>10th</option>
<option>XI</option>
<option>XII</option>
<option>BA</option>
<option>BSC</option>
<option>BCA</option>
<option>BCOM</option>
<option>MA</option>
<option>MPHIL</option>
<option>PHD</option>
</select>

<label>Passport Photo (Max 100KB)</label>
<input type="file" name="photo" required>

<label>Signature (Max 50KB)</label>
<input type="file" name="sign">

<label>Admit Card</label>
<input type="file" name="admit">

<label>Marksheet</label>
<input type="file" name="marksheet">

<label>Extra Document</label>
<input type="file" name="doc">

<button type="submit">Submit Application</button>

</form>

</div>
<script>
const scriptURL = "https://script.google.com/macros/s/AKfycbzyLKXq7OLGSkKJRJ0cyGWlM6X0utHwYhoJd9ADSXGahR2GpONFG03w0EsLis3C3Trw/exec";
const form = document.getElementById("jobForm");

form.addEventListener("submit", async e => {
  e.preventDefault();

  let obj = {};
  for (let [key, value] of new FormData(form).entries()) {
    if (value instanceof File && value.size > 0) {
      obj[key] = await toBase64(value);   // convert file to Base64
    } else {
      obj[key] = value;
    }
  }

  console.log(obj);   // Debug: check Base64 strings in console

  fetch(scriptURL, {
    method: "POST",
    body: JSON.stringify(obj)
  })
  .then(res => res.text())
  .then(() => {
    alert("Application Submitted Successfully");
    form.reset();
  })
  .catch(err => alert("Submission Error: " + err));
});

function toBase64(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result); // "data:image/png;base64,..."
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}
</script>



</body>
</html>
