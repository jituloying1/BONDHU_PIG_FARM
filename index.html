<!DOCTYPE html>
<html>
<head>
<title>Job Application Form</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:Arial;
background:#f2f2f2;
}

.container{
width:500px;
margin:auto;
background:white;
padding:20px;
margin-top:40px;
border-radius:10px;
box-shadow:0 0 10px gray;
}

h2{
text-align:center;
}

input,select{
width:100%;
padding:10px;
margin-top:10px;
}

button{
width:100%;
padding:12px;
margin-top:15px;
background:green;
color:white;
border:none;
font-size:16px;
cursor:pointer;
}

</style>
</head>

<body>

<div class="container">

<h2>Job Application</h2>

<form>

<label>Name</label>
<input type="text" name="name" required>

<label>Father Name</label>
<input type="text" name="father">

<label>Mother Name</label>
<input type="text" name="mother">

<label>Email</label>
<input type="email" name="email">

<label>Phone</label>
<input type="text" name="phone">

<label>Gender</label>
<select name="gender">
<option value="">Select Gender</option>
<option>Male</option>
<option>Female</option>
<option>Other</option>
</select>

<label>Qualification</label>
<select name="qualification">
<option>Class 8</option>
<option>Class 9</option>
<option>Class 10</option>
<option>Class 11</option>
<option>Class 12</option>
<option>BA</option>
<option>MA</option>
</select>

<select id="state" onchange="loadDistricts()">
<option>Select State</option>
<option>Assam</option>
<option>Bihar</option>
<option>Karnataka</option>
<option>West Bengal</option>
</select>

<label>Select District</label>
<select id="district">
<option>Select District</option>
</select>

<label>Pincode</label>
<input type="text" id="pincode" onblur="getPostOffice()">

<label>Post Office</label>
<input type="text" id="postoffice" readonly>

<h3>Upload Documents</h3>

<label>Upload Photo</label>
<input type="file" accept="image/*">

<label>Upload Signature</label>
<input type="file" accept="image/*">

<label>Upload Admit Card</label>
<input type="file">

<label>Upload Aadhaar Card</label>
<input type="file">

<label>Upload Marksheet</label>
<input type="file">

<label>Upload Caste Certificate</label>
<input type="file">

<button type="submit">Submit Application</button>

</form>

</div>

<script>

const districts = {

"Assam":[
"Baksa","Barpeta","Biswanath","Bongaigaon","Cachar","Charaideo",
"Chirang","Darrang","Dhemaji","Dhubri","Dibrugarh","Goalpara",
"Golaghat","Hailakandi","Hojai","Jorhat","Kamrup","Kamrup Metro",
"Karbi Anglong","Karimganj","Kokrajhar","Lakhimpur","Majuli",
"Morigaon","Nagaon","Nalbari","Sivasagar","Sonitpur",
"South Salmara","Tinsukia","Udalguri","West Karbi Anglong"
],

"Bihar":[
"Araria","Arwal","Aurangabad","Banka","Begusarai","Bhagalpur",
"Bhojpur","Buxar","Darbhanga","East Champaran","Gaya",
"Gopalganj","Jamui","Jehanabad","Kaimur","Katihar",
"Khagaria","Kishanganj","Lakhisarai","Madhepura",
"Madhubani","Munger","Muzaffarpur","Nalanda",
"Nawada","Patna","Purnia","Rohtas","Saharsa",
"Samastipur","Saran","Sheikhpura","Sheohar",
"Sitamarhi","Siwan","Supaul","Vaishali","West Champaran"
],

"Karnataka":[
"Bagalkot","Ballari","Belagavi","Bengaluru Rural",
"Bengaluru Urban","Bidar","Chamarajanagar",
"Chikballapur","Chikkamagaluru","Chitradurga",
"Dakshina Kannada","Davanagere","Dharwad",
"Gadag","Hassan","Haveri","Kalaburagi",
"Kodagu","Kolar","Koppal","Mandya",
"Mysuru","Raichur","Ramanagara",
"Shivamogga","Tumakuru","Udupi",
"Uttara Kannada","Vijayapura","Yadgir"
],

"West Bengal":[
"Alipurduar","Bankura","Birbhum","Cooch Behar",
"Darjeeling","Hooghly","Howrah","Jalpaiguri",
"Jhargram","Kalimpong","Kolkata","Malda",
"Murshidabad","Nadia","North 24 Parganas",
"Paschim Bardhaman","Purba Bardhaman",
"Purulia","South 24 Parganas","Uttar Dinajpur"
]

};

function loadDistricts(){

let state=document.getElementById("state").value;
let district=document.getElementById("district");

district.innerHTML="<option>Select District</option>";

if(districts[state]){

districts[state].forEach(function(d){

let option=document.createElement("option");
option.text=d;
district.add(option);

});

}

}

</script>
</body>
</html>
