<!DOCTYPE html>
<html>
<head>
<title>ABC School Application Form</title>

<style>
body{font-family:Arial;background:#f2f2f2;padding:40px;}
.container{width:650px;margin:auto;background:white;padding:25px;border-radius:8px;box-shadow:0 0 10px rgba(0,0,0,0.2);}
input,select{width:100%;padding:8px;margin:8px 0;}
button{padding:10px;background:#007BFF;color:white;border:none;cursor:pointer;width:100%;}
</style>

<script>

function generateID(){
return "ABC"+Date.now();
}

function fileToBase64(file){
return new Promise(resolve=>{
let reader=new FileReader();
reader.onload=()=>resolve(reader.result);
reader.readAsDataURL(file);
});
}

async function submitForm(event){

event.preventDefault();

let users=JSON.parse(localStorage.getItem("users"))||[];

let photo=document.getElementById("photo").files[0];
let signature=document.getElementById("signature").files[0];
let marksheet=document.getElementById("marksheet").files[0];
let birth=document.getElementById("birth").files[0];
let admit=document.getElementById("admit").files[0];

if(photo && photo.size>50*1024){
alert("Photo must be under 50KB");
return;
}

if(signature && signature.size>20*1024){
alert("Signature must be under 20KB");
return;
}

let user={

appID:generateID(),
name:document.getElementById("name").value,
father:document.getElementById("father").value,
mother:document.getElementById("mother").value,
dob:document.getElementById("dob").value,
applydate:document.getElementById("applydate").value,
post:document.getElementById("post").value,

photo:photo?await fileToBase64(photo):"",
signature:signature?await fileToBase64(signature):"",
marksheet:marksheet?await fileToBase64(marksheet):"",
birth:birth?await fileToBase64(birth):"",
admit:admit?await fileToBase64(admit):""

};

users.push(user);

localStorage.setItem("users",JSON.stringify(users));

alert("Application Submitted Successfully!");

generateReceipt(user);

document.getElementById("form").reset();

}

function generateReceipt(user){

let receiptContent=`

<html>

<head>

<title>Application Receipt</title>

<style>

body{font-family:Arial;padding:20px;}
h1{text-align:center;}
table{width:100%;border-collapse:collapse;margin-top:20px;}
td,th{border:1px solid black;padding:10px;}

</style>

</head>

<body>

<h1>ABC School</h1>

<h2 style="text-align:center;">Application Receipt</h2>

<table>

<tr>
<th>Application ID</th>
<td>${user.appID}</td>
</tr>

<tr>
<th>Name</th>
<td>${user.name}</td>
</tr>

<tr>
<th>Date Of Birth</th>
<td>${user.dob}</td>
</tr>

<tr>
<th>Application Date</th>
<td>${user.applydate}</td>
</tr>

<tr>
<th>Post Applied</th>
<td>${user.post}</td>
</tr>


<tr>
<th>HELP LINE NUMBER </th>
<td>7896220943</td>
</tr>
</table>

</body>

</html>

`;

let blob=new Blob([receiptContent],{type:"text/html"});

let url=URL.createObjectURL(blob);

let a=document.createElement("a");

a.href=url;

a.download="Receipt_"+user.appID+".html";

document.body.appendChild(a);

a.click();

document.body.removeChild(a);

}

async function submitForm(event){

event.preventDefault();

let photo=document.getElementById("photo").files[0];
let signature=document.getElementById("signature").files[0];
let marksheet=document.getElementById("marksheet").files[0];
let birth=document.getElementById("birth").files[0];
let admit=document.getElementById("admit").files[0];

if(photo && photo.size>50*1024){
alert("Photo must be under 50KB");
return;
}

if(signature && signature.size>20*1024){
alert("Signature must be under 20KB");
return;
}

let user={

appID:generateID(),
name:document.getElementById("name").value,
father:document.getElementById("father").value,
mother:document.getElementById("mother").value,
dob:document.getElementById("dob").value,
applydate:document.getElementById("applydate").value,
post:document.getElementById("post").value,

photo:photo?await fileToBase64(photo):"",
signature:signature?await fileToBase64(signature):"",
marksheet:marksheet?await fileToBase64(marksheet):"",
birth:birth?await fileToBase64(birth):"",
admit:admit?await fileToBase64(admit):""

};

fetch("https://script.google.com/macros/s/AKfycbz1CiaTO6rj771EoQQ8TFRcfkyzvZJQFQ7JLAQQGZJt8QJzzR0UeIzD-rYuS-KUHKf8/exec",{
method:"POST",
body:JSON.stringify(user)
})
.then(res=>res.json())
.then(data=>{

alert("Application Submitted Successfully!");

generateReceipt(user);

document.getElementById("form").reset();

})
.catch(err=>{
alert("Error submitting form");
console.log(err);
});

}

</script>

</head>

<body>

<div class="container">

<h2>ABC School Job Application</h2>

<form id="form" onsubmit="submitForm(event)">

Name
<input type="text" id="name" required>

Father Name
<input type="text" id="father">

Mother Name
<input type="text" id="mother">

Date Of Birth
<input type="date" id="dob" required>

Applying Date
<input type="date" id="applydate" required>

Applying For

<select id="post">

<option>Peon</option>
<option>Front Desk</option>
<option>Website Design Faculty</option>
<option>Python Faculty</option>
<option>IOT Faculty</option>
<option>Model Faculty</option>
<option>English Teacher</option>

</select>

Upload Marksheet
<input type="file" id="marksheet">

Upload Birth Certificate
<input type="file" id="birth">

Upload Admit Card
<input type="file" id="admit">

Passport Photo (Max 50KB)
<input type="file" id="photo">

Signature (Max 20KB)
<input type="file" id="signature">

<br><br>

<button type="submit">Submit Application</button>

</form>

<br>

<a href="datastore.html">
<button>Data Store</button>
</a>

</div>

</body>
</html>
