<!DOCTYPE html>
<html>
<head>
<title>ABC School Application Form</title>

<style>

body{
font-family:Arial;
background:#f2f2f2;
padding:40px;
}

.container{
width:600px;
margin:auto;
background:white;
padding:25px;
border-radius:8px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
}

input,select{
width:100%;
padding:8px;
margin:8px 0;
}

button{
padding:10px;
background:#007BFF;
color:white;
border:none;
cursor:pointer;
width:100%;
}

button:hover{
background:#0056b3;
}

</style>

<script>

function generateID(){
return "APP"+Math.floor(Math.random()*100000);
}

function submitForm(){

event.preventDefault();

let users = JSON.parse(localStorage.getItem("users")) || [];

let appID = generateID();

let user = {

appID:appID,
name:document.getElementById("name").value,
father:document.getElementById("father").value,
mother:document.getElementById("mother").value,
dob:document.getElementById("dob").value,
applydate:document.getElementById("applydate").value,
post:document.getElementById("post").value

};

users.push(user);

localStorage.setItem("users",JSON.stringify(users));

generateReceipt(user);

document.getElementById("form").reset();

}

function generateReceipt(user){

let receipt =
`ABC SCHOOL

Application Receipt

Application ID: ${user.appID}

Name: ${user.name}
Father Name: ${user.father}
Mother Name: ${user.mother}

Post Applied: ${user.post}

Application Date: ${user.applydate}

Thank you for applying at ABC School
`;

let blob = new Blob([receipt],{type:"text/plain"});

let a=document.createElement("a");

a.href=URL.createObjectURL(blob);

a.download=`Receipt_${user.appID}.txt`;

a.click();

alert("Application Submitted Successfully");

}

</script>

</head>

<body>

<div class="container">

<h2>ABC School Job Application</h2>

<form id="form" onsubmit="submitForm()">

Name
<input type="text" id="name" required>

Father Name
<input type="text" id="father">

Mother Name
<input type="text" id="mother">

Date of Birth
<input type="date" id="dob">

Applying Date
<input type="date" id="applydate">

Applying For

<select id="post">

<option>Peon</option>
<option>Front Desk</option>
<option>Website Design Faculty</option>
<option>Python Faculty</option>
<option>IOT Faculty</option>
<option>Model Faculty</option>
<option>English Teacher</option>

</select>

Upload Marksheet
<input type="file">

Upload Birth Certificate
<input type="file">

Upload Admit Card
<input type="file">

Upload Certificates
<input type="file">

Upload Other Supporting Documents
<input type="file">

<br><br>

<button type="submit">Submit Application</button>

</form>

<br>

<a href="datastore.html">
<button>Data Store</button>
</a>

</div>

</body>
</html>
