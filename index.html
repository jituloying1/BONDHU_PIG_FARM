<!DOCTYPE html>
<html>
<head>
<title>Job Application Form</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:Arial;
background:#f2f2f2;
}

.container{
width:500px;
margin:auto;
background:white;
padding:20px;
margin-top:40px;
border-radius:10px;
box-shadow:0 0 10px gray;
}

h2{
text-align:center;
}

input,select{
width:100%;
padding:8px;
margin-top:5px;
margin-bottom:15px;
}

button{
padding:10px;
background:green;
color:white;
border:none;
width:100%;
font-size:16px;
cursor:pointer;
}

.preview{
display:none;
}

img{
width:120px;
margin-top:10px;
}

</style>
</head>

<body>

<div class="container">

<h2>Job Application Form</h2>

<div id="formPage">

<label>Name</label>
<input type="text" id="name">

<label>Father Name</label>
<input type="text" id="father">

<label>Mother Name</label>
<input type="text" id="mother">

<label>Email</label>
<input type="email" id="email">

<label>Phone Number</label>
<input type="text" id="phone">

<label>Aadhar Number</label>
<input type="text" id="adhar">

<label>Date of Birth</label>
<input type="date" id="dob">

<label>Apply Date</label>
<input type="date" id="applydate">

<label>Qualification</label>
<select id="qualification">

<option>10th</option>
<option>XI</option>
<option>XII</option>
<option>BA</option>
<option>BSC</option>
<option>BCA</option>
<option>BCOM</option>
<option>MA</option>
<option>MPHIL</option>
<option>PHD</option>

</select>

<label>Passport Size Photo</label>
<input type="file" id="photo" accept="image/*">

<label>Signature</label>
<input type="file" id="sign" accept="image/*">

<label>Admit Card Upload</label>
<input type="file" id="admit">

<label>Marksheet Upload</label>
<input type="file" id="marksheet">

<label>Extra Supporting Document</label>
<input type="file" id="doc">

<label>
<input type="checkbox" id="declaration">
I declare that the information given above is correct.
</label>

<button onclick="previewData()">Preview</button>

</div>

<div id="previewPage" class="preview">

<h2>Application Preview</h2>

<p><b>Name:</b> <span id="pname"></span></p>
<p><b>Father Name:</b> <span id="pfather"></span></p>
<p><b>Mother Name:</b> <span id="pmother"></span></p>
<p><b>Email:</b> <span id="pemail"></span></p>
<p><b>Phone:</b> <span id="pphone"></span></p>
<p><b>Aadhar:</b> <span id="padhar"></span></p>
<p><b>DOB:</b> <span id="pdob"></span></p>
<p><b>Apply Date:</b> <span id="papply"></span></p>
<p><b>Qualification:</b> <span id="pqualification"></span></p>

<p><b>Photo:</b></p>
<img id="pphoto">

<p><b>Signature:</b></p>
<img id="psign">

<p><b>Admit Card:</b></p>
<p id="padmit"></p>

<p><b>Marksheet:</b></p>
<p id="pmarksheet"></p>

<br><br>

<button onclick="submitForm()">Submit Application</button>

</div>

</div>
  <script>
function previewData(){

if(!document.getElementById("declaration").checked){
alert("Please accept declaration");
return;
}

formPage.style.display="none";
previewPage.style.display="block";

pname.innerText=name.value;
pfather.innerText=father.value;
pmother.innerText=mother.value;
pemail.innerText=email.value;
pphone.innerText=phone.value;
padhar.innerText=adhar.value;
pdob.innerText=dob.value;
papply.innerText=applydate.value;
pqualification.innerText=qualification.value;

let photoFile = photo.files[0];
let signFile = sign.files[0];
let admitFile = admit.files[0];
let marksheetFile = marksheet.files[0];

if(photoFile){
pphoto.src = URL.createObjectURL(photoFile);
}

if(signFile){
psign.src = URL.createObjectURL(signFile);
}

if(admitFile){
padmit.innerText = admitFile.name;
}

if(marksheetFile){
pmarksheet.innerText = marksheetFile.name;
}

}

function fileToBase64(file){
return new Promise((resolve,reject)=>{
let reader = new FileReader();
reader.readAsDataURL(file);
reader.onload=()=>resolve(reader.result);
reader.onerror=error=>reject(error);
});
}

async function submitForm(){

let photo64 = photo.files[0] ? await fileToBase64(photo.files[0]) : "";
let sign64 = sign.files[0] ? await fileToBase64(sign.files[0]) : "";
let admit64 = admit.files[0] ? await fileToBase64(admit.files[0]) : "";
let marksheet64 = marksheet.files[0] ? await fileToBase64(marksheet.files[0]) : "";
let doc64 = doc.files[0] ? await fileToBase64(doc.files[0]) : "";

let data={
name:name.value,
father:father.value,
mother:mother.value,
email:email.value,
phone:phone.value,
adhar:adhar.value,
dob:dob.value,
applydate:applydate.value,
qualification:qualification.value,
photo:photo64,
sign:sign64,
admit:admit64,
marksheet:marksheet64,
doc:doc64
};

fetch("https://script.google.com/macros/s/AKfycbyUhWj8fPPOBADA4VIgBmuTllLeq1TW1i0w11A-3jmyNCW5I85w6gZySKHgv4ReXuuu/exec",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify(data)
})
.then(res=>res.json())
.then(res=>{
alert("Application Submitted Successfully");
location.reload();
})
.catch(err=>{
console.log(err);
alert("Submit Error");
});

}
</script>
</body>
</html>
