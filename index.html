<!DOCTYPE html>
<html>
<head>
<title>Job Application System</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:Arial;
background:#f4f4f4;
}

.container{
width:500px;
margin:auto;
background:white;
padding:20px;
margin-top:30px;
border-radius:10px;
box-shadow:0 0 10px gray;
}

h2{
text-align:center;
}

input,select{
width:100%;
padding:8px;
margin-top:5px;
margin-bottom:15px;
}

button{
width:100%;
padding:12px;
background:#007bff;
color:white;
border:none;
font-size:16px;
cursor:pointer;
border-radius:5px;
}

button:hover{
background:#0056b3;
}

</style>
</head>

<body>

<div class="container">

<h2>Job Application Form</h2>

<form id="jobForm">

<label>Name</label>
<input type="text" name="name" required>

<label>Father Name</label>
<input type="text" name="father" required>

<label>Mother Name</label>
<input type="text" name="mother">

<label>Email</label>
<input type="email" name="email" required>

<label>Phone Number</label>
<input type="text" name="phone" required>

<label>Aadhar Number</label>
<input type="text" name="adhar">

<label>Date of Birth</label>
<input type="date" name="dob">

<label>Qualification</label>

<select name="qualification">
<option>10th</option>
<option>XI</option>
<option>XII</option>
<option>BA</option>
<option>BSC</option>
<option>BCA</option>
<option>BCOM</option>
<option>MA</option>
<option>MPHIL</option>
<option>PHD</option>
</select>

<label>Passport Photo (Max 100KB)</label>
<input type="file" name="photo" required>

<label>Signature (Max 50KB)</label>
<input type="file" name="sign">

<label>Admit Card</label>
<input type="file" name="admit">

<label>Marksheet</label>
<input type="file" name="marksheet">

<label>Extra Document</label>
<input type="file" name="doc">

<button type="submit">Submit Application</button>

</form>

</div>

<script>

const scriptURL="https://script.google.com/macros/s/AKfycbyTMyosGRCbiOeI6OX1sepijsMkGzCHAASsylLUFWWQlSST4pEde055gER7_M0wbXDV/exec";

const form=document.getElementById("jobForm");

form.addEventListener("submit", async e => {
  e.preventDefault();

  const formData = new FormData(form);
  const data = {
    name: formData.get("name"),
    father: formData.get("father"),
    mother: formData.get("mother"),
    email: formData.get("email"),
    phone: formData.get("phone"),
    adhar: formData.get("adhar"),
    dob: formData.get("dob"),
    qualification: formData.get("qualification"),
    photo: "",
    sign: "",
    admit: "",
    marksheet: "",
    doc: ""
  };

  async function fileToBase64(file) {
    return new Promise((resolve, reject) => {
      if (!file) resolve("");
      const reader = new FileReader();
      reader.onload = () => resolve(reader.result);
      reader.onerror = reject;
      reader.readAsDataURL(file);
    });
  }

  data.photo = await fileToBase64(formData.get("photo"));
  data.sign = await fileToBase64(formData.get("sign"));
  data.admit = await fileToBase64(formData.get("admit"));
  data.marksheet = await fileToBase64(formData.get("marksheet"));
  data.doc = await fileToBase64(formData.get("doc"));

  fetch(scriptURL, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(data)
  })
    .then(res => res.json())
    .then(() => {
      alert("Application Submitted Successfully");
      form.reset();
    })
    .catch(err => {
      console.log(err);
      alert("Submission Error");
    });
});

</script>

</body>
</html>
