<!DOCTYPE html>
<html>
<head>
<title>Job Application System</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:Arial;
background:#f4f4f4;
}

.container{
width:500px;
margin:auto;
background:white;
padding:20px;
margin-top:30px;
border-radius:10px;
box-shadow:0 0 10px gray;
}

h2{
text-align:center;
}

input,select{
width:100%;
padding:8px;
margin-top:5px;
margin-bottom:15px;
}

button{
width:100%;
padding:12px;
background:#007bff;
color:white;
border:none;
font-size:16px;
cursor:pointer;
border-radius:5px;
}

button:hover{
background:#0056b3;
}

</style>
</head>

<body>

<div class="container">

<h2>Job Application Form</h2>

<form id="jobForm">

<label>Name</label>
<input type="text" name="name" required>

<label>Father Name</label>
<input type="text" name="father" required>

<label>Mother Name</label>
<input type="text" name="mother">

<label>Email</label>
<input type="email" name="email" required>

<label>Phone Number</label>
<input type="text" name="phone" required>

<label>Aadhar Number</label>
<input type="text" name="adhar">

<label>Date of Birth</label>
<input type="date" name="dob">

<label>Qualification</label>

<select name="qualification">
<option>10th</option>
<option>XI</option>
<option>XII</option>
<option>BA</option>
<option>BSC</option>
<option>BCA</option>
<option>BCOM</option>
<option>MA</option>
<option>MPHIL</option>
<option>PHD</option>
</select>

<label>Gender</label>
<select name=" gender">
<option>Male </option>
<option>Female</option>
</select>

 <label>  Select Your Caste </label>
<select name="caste">
<option>ST-P </option>
<option>ST-H</option>
<option>OBC </option>
<option>GENERAL</option>
<option>Tea-Gerden-living </option>
<option>Other</option>
</select>
<label>Passport Photo (Max 100KB)</label>
<input type="file" name="photo" required>

<label>Signature (Max 50KB)</label>
<input type="file" name="sign">

<label>Admit Card</label>
<input type="file" name="admit">

<label>Marksheet</label>
<input type="file" name="marksheet">

<label>Extra Document</label>
<input type="file" name="doc">

<button type="submit">Submit Application</button>

</form>

</div>
<script>
const scriptURL = "https://script.google.com/macros/s/AKfycbzyLKXq7OLGSkKJRJ0cyGWlM6X0utHwYhoJd9ADSXGahR2GpONFG03w0EsLis3C3Trw/exec";

const form = document.getElementById("jobForm");

form.addEventListener("submit", async (e) => {
  e.preventDefault();

  const formData = new FormData(form);
  const files = ["photo","sign","admit","marksheet","doc"];

  // Convert files to Base64
  const base64Files = {};
  for (let f of files) {
    const file = formData.get(f);
    if (file && file.size > 0) {
      base64Files[f] = await fileToBase64(file);
    } else {
      base64Files[f] = "";
    }
  }

  // Prepare JSON payload
  const data = {
    name: formData.get("name"),
    father: formData.get("father"),
    mother: formData.get("mother"),
    email: formData.get("email"),
    phone: formData.get("phone"),
    adhar: formData.get("adhar"),
    dob: formData.get("dob"),
    qualification: formData.get("qualification"),
    gender: formData.get("gender"),
    caste: formData.get("caste"),
    photo: base64Files.photo,
    sign: base64Files.sign,
    admit: base64Files.admit,
    marksheet: base64Files.marksheet,
    doc: base64Files.doc
  };

  // Send JSON to Apps Script
  fetch(scriptURL, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(data)
  })
  .then(res => res.json())
  .then(data => {
    alert("Application Submitted Successfully");
    form.reset();
  })
  .catch(err => {
    console.error(err);
    alert("Submission Error");
  });
});

// Helper to convert file to Base64
function fileToBase64(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result);
    reader.onerror = error => reject(error);
    reader.readAsDataURL(file);
  });
}
</script>

</body>
</html>
