<!DOCTYPE html>
<html>
<head>
<title>ABC School Application Form</title>

<style>
body{font-family:Arial;background:#f2f2f2;padding:40px;}
.container{width:650px;margin:auto;background:white;padding:25px;border-radius:8px;box-shadow:0 0 10px rgba(0,0,0,0.2);}
input,select{width:100%;padding:8px;margin:8px 0;}
button{padding:10px;background:#007BFF;color:white;border:none;cursor:pointer;width:100%;}
.error{color:#b30000;background:#ffd6d6;padding:8px;border-radius:4px;margin-top:5px;display:none;}
</style>

<script>

function generateID(){
return "ABC"+Date.now();
}

function fileToBase64(file){
return new Promise((resolve)=>{
let reader=new FileReader();
reader.onload=()=>resolve(reader.result);
reader.readAsDataURL(file);
});
}

async function submitForm(){

event.preventDefault();

let users = JSON.parse(localStorage.getItem("users")) || [];

let appID=generateID();

let photo=document.getElementById("photo").files[0];
let signature=document.getElementById("signature").files[0];
let marksheet=document.getElementById("marksheet").files[0];
let birth=document.getElementById("birth").files[0];
let admit=document.getElementById("admit").files[0];

if(photo && photo.size>50*1024){
alert("Photo must be under 50KB");
return;
}

if(signature && signature.size>20*1024){
alert("Signature must be under 20KB");
return;
}

let user={

appID:appID,
name:name.value,
father:father.value,
mother:mother.value,
dob:dob.value,
applydate:applydate.value,
post:post.value,

photo:photo ? await fileToBase64(photo):"",
signature:signature ? await fileToBase64(signature):"",
marksheet:marksheet ? await fileToBase64(marksheet):"",
birth:birth ? await fileToBase64(birth):"",
admit:admit ? await fileToBase64(admit):""

};

users.push(user);

localStorage.setItem("users",JSON.stringify(users));

alert("Application Submitted Successfully");

form.reset();

}

</script>

</head>

<body>

<div class="container">

<h2>ABC School Job Application</h2>

<form id="form" onsubmit="submitForm()">

Name
<input type="text" id="name" required>

Father Name
<input type="text" id="father">

Mother Name
<input type="text" id="mother">

Date of Birth
<input type="date" id="dob">

Applying Date
<input type="date" id="applydate">

Applying For
<select id="post">
<option>Peon</option>
<option>Front Desk</option>
<option>Website Design Faculty</option>
<option>Python Faculty</option>
<option>IOT Faculty</option>
<option>Model Faculty</option>
<option>English Teacher</option>
</select>

Upload Marksheet
<input type="file" id="marksheet">

Upload Birth Certificate
<input type="file" id="birth">

Upload Admit Card
<input type="file" id="admit">

Passport Photo (Max 50KB)
<input type="file" id="photo">

Signature (Max 20KB)
<input type="file" id="signature">

<br><br>

<button type="submit">Submit Application</button>

</form>

<br>

<a href="datastore.html">
<button>Data Store</button>
</a>

</div>

</body>
</html>
