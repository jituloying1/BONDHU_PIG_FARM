<!DOCTYPE html>
<html>
<head>
<title>Job Application System</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body{font-family:Arial;background:#f4f4f4;}
.container{width:500px;margin:auto;background:white;padding:20px;margin-top:30px;border-radius:10px;box-shadow:0 0 10px gray;}
h2{text-align:center;}
input,select{width:100%;padding:8px;margin-top:5px;margin-bottom:15px;}
button{width:100%;padding:12px;background:#007bff;color:white;border:none;font-size:16px;cursor:pointer;border-radius:5px;}
button:hover{background:#0056b3;}
</style>
</head>
<body>

<div class="container">
<h2>Job Application Form</h2>

<form id="jobForm">
<label>Name</label>
<input type="text" name="name" required>
<label>Father Name</label>
<input type="text" name="father" required>
<label>Mother Name</label>
<input type="text" name="mother">
<label>Email</label>
<input type="email" name="email" required>
<label>Phone Number</label>
<input type="text" name="phone" required>
<label>Aadhar Number</label>
<input type="text" name="adhar">
<label>Date of Birth</label>
<input type="date" name="dob">
<label>Qualification</label>
<select name="qualification">
<option>10th</option><option>XI</option><option>XII</option><option>BA</option>
<option>BSC</option><option>BCA</option><option>BCOM</option><option>MA</option>
<option>MPHIL</option><option>PHD</option>
</select>

<label>Passport Photo (Max 100KB)</label>
<input type="file" name="photo" required>
<label>Signature (Max 50KB)</label>
<input type="file" name="sign">
<label>Admit Card</label>
<input type="file" name="admit">
<label>Marksheet</label>
<input type="file" name="marksheet">
<label>Extra Document</label>
<input type="file" name="doc">

<button type="submit">Submit Application</button>
</form>
</div>
<script>
function checkFileSize(file, maxKB) {
  if (!file) return true; // allow empty file if optional
  const sizeKB = file.size / 1024;
  return sizeKB <= maxKB;
}

document.getElementById("jobForm").addEventListener("submit", async (e) => {
  e.preventDefault();
  const form = e.target;

  // Validate file sizes
  if (!checkFileSize(form.photo.files[0], 100)) {
    alert("Photo must be less than 100KB!");
    return;
  }
  if (!checkFileSize(form.sign.files[0], 50)) {
    alert("Signature must be less than 50KB!");
    return;
  }
  if (!checkFileSize(form.admit.files[0], 200)) { // optional, example limit
    alert("Admit Card is too large!");
    return;
  }
  if (!checkFileSize(form.marksheet.files[0], 200)) {
    alert("Marksheet is too large!");
    return;
  }
  if (!checkFileSize(form.doc.files[0], 200)) {
    alert("Extra document is too large!");
    return;
  }

  // Convert files to Base64
  const data = {
    name: form.name.value,
    father: form.father.value,
    mother: form.mother.value,
    email: form.email.value,
    phone: form.phone.value,
    adhar: form.adhar.value,
    dob: form.dob.value,
    qualification: form.qualification.value,
    photo: await fileToBase64(form.photo.files[0] || null),
    sign: await fileToBase64(form.sign.files[0] || null),
    admit: await fileToBase64(form.admit.files[0] || null),
    marksheet: await fileToBase64(form.marksheet.files[0] || null),
    doc: await fileToBase64(form.doc.files[0] || null)
  };

  fetch(scriptURL, {
    method: "POST",
    body: JSON.stringify(data),
    headers: { "Content-Type": "application/json" }
  })
  .then(res => res.json())
  .then(resp => {
    if (resp.result == "success") {
      alert("Application Submitted Successfully");
      form.reset();
    } else {
      alert("Submission failed: " + (resp.error || ""));
    }
  })
  .catch(err => {
    console.error(err);
    alert("Submission Error: " + err.message);
  });
});
</script>
</body>
</html>
