<!DOCTYPE html>
<html>
<head>
<title>Job Application Form</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:Arial;
background:#f2f2f2;
}

.container{
width:500px;
margin:auto;
background:white;
padding:20px;
margin-top:40px;
border-radius:10px;
box-shadow:0 0 10px gray;
}

h2{
text-align:center;
}

input,select{
width:100%;
padding:8px;
margin-top:5px;
margin-bottom:15px;
}

button{
padding:10px;
background:green;
color:white;
border:none;
width:100%;
font-size:16px;
cursor:pointer;
}

.preview{
display:none;
}

img{
width:120px;
margin-top:10px;
}

</style>
</head>

<body>

<div class="container">

<h2>Job Application Form</h2>

<div id="formPage">

<label>Name</label>
<input type="text" id="name">

<label>Father Name</label>
<input type="text" id="father">

<label>Mother Name</label>
<input type="text" id="mother">

<label>Email</label>
<input type="email" id="email">

<label>Phone Number</label>
<input type="text" id="phone">

<label>Aadhar Number</label>
<input type="text" id="adhar">

<label>Date of Birth</label>
<input type="date" id="dob">

<label>Apply Date</label>
<input type="date" id="applydate">

<label>Qualification</label>
<select id="qualification">

<option>10th</option>
<option>XI</option>
<option>XII</option>
<option>BA</option>
<option>BSC</option>
<option>BCA</option>
<option>BCOM</option>
<option>MA</option>
<option>MPHIL</option>
<option>PHD</option>

</select>

<label>Passport Size Photo</label>
<input type="file" id="photo" accept="image/*">

<label>Signature</label>
<input type="file" id="sign" accept="image/*">

<label>Admit Card Upload</label>
<input type="file" id="admit">

<label>Marksheet Upload</label>
<input type="file" id="marksheet">

<label>Extra Supporting Document</label>
<input type="file" id="doc">

<label>
<input type="checkbox" id="declaration">
I declare that the information given above is correct.
</label>

<button onclick="previewData()">Preview</button>

</div>

<div id="previewPage" class="preview">

<h2>Application Preview</h2>

<p><b>Name:</b> <span id="pname"></span></p>
<p><b>Father Name:</b> <span id="pfather"></span></p>
<p><b>Mother Name:</b> <span id="pmother"></span></p>
<p><b>Email:</b> <span id="pemail"></span></p>
<p><b>Phone:</b> <span id="pphone"></span></p>
<p><b>Aadhar:</b> <span id="padhar"></span></p>
<p><b>DOB:</b> <span id="pdob"></span></p>
<p><b>Apply Date:</b> <span id="papply"></span></p>
<p><b>Qualification:</b> <span id="pqualification"></span></p>

<p><b>Photo:</b></p>
<img id="pphoto">

<p><b>Signature:</b></p>
<img id="psign">

<p><b>Admit Card:</b></p>
<p id="padmit"></p>

<p><b>Marksheet:</b></p>
<p id="pmarksheet"></p>

<br><br>

<button onclick="submitForm()">Submit Application</button>

</div>

</div>
  <script>
function doPost(e) {

var sheet = SpreadsheetApp.getActiveSpreadsheet().getSheetByName("Sheet1");

var folder = DriveApp.getFolderById("YOUR_FOLDER_ID");

var data = JSON.parse(e.postData.contents);

function saveFile(base64Data, fileName){

if(!base64Data){
return "";
}

var parts = base64Data.split(",");
var contentType = parts[0].match(/:(.*?);/)[1];
var bytes = Utilities.base64Decode(parts[1]);

var blob = Utilities.newBlob(bytes, contentType, fileName);
var file = folder.createFile(blob);

return file.getUrl();

}

var photoLink = saveFile(data.photo,"photo_"+data.name);
var signLink = saveFile(data.sign,"sign_"+data.name);
var admitLink = saveFile(data.admit,"admit_"+data.name);
var marksheetLink = saveFile(data.marksheet,"marksheet_"+data.name);
var docLink = saveFile(data.doc,"doc_"+data.name);

sheet.appendRow([
data.name,
data.father,
data.mother,
data.email,
data.phone,
data.adhar,
data.dob,
data.applydate,
data.qualification,
photoLink,
signLink,
admitLink,
marksheetLink,
docLink
]);

return ContentService
.createTextOutput(JSON.stringify({result:"success"}))
.setMimeType(ContentService.MimeType.JSON);

}
async function submitForm(){

let photo = photo.files[0] ? await fileToBase64(photo.files[0]) : "";
let sign = sign.files[0] ? await fileToBase64(sign.files[0]) : "";
let admit = admit.files[0] ? await fileToBase64(admit.files[0]) : "";
let marksheet = marksheet.files[0] ? await fileToBase64(marksheet.files[0]) : "";
let doc = doc.files[0] ? await fileToBase64(doc.files[0]) : "";

let data = {
name:name.value,
father:father.value,
mother:mother.value,
email:email.value,
phone:phone.value,
adhar:adhar.value,
dob:dob.value,
applydate:applydate.value,
qualification:qualification.value,
photo:photo,
sign:sign,
admit:admit,
marksheet:marksheet,
doc:doc
};

fetch("https://script.google.com/macros/s/AKfycbyUhWj8fPPOBADA4VIgBmuTllLeq1TW1i0w11A-3jmyNCW5I85w6gZySKHgv4ReXuuu/exec",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify(data)
})
.then(res=>res.json())
.then(res=>{
alert("Application Submitted Successfully");
location.reload();
})
.catch(err=>{
console.log(err);
alert("Submit Error");
});
}
</script>
</body>
</html>
