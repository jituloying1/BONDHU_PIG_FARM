<!DOCTYPE html>
<html>
<head>

<title>Application Data Store</title>

<style>

body{
font-family:Arial;
padding:30px;
background:#f4f4f4;
}

table{
width:100%;
border-collapse:collapse;
background:white;
}

th,td{
border:1px solid black;
padding:10px;
}

th{
background:#007BFF;
color:white;
}

</style>

</head>

<body>

<h2>ABC School Applications</h2>

<table id="table">

<tr>
<th>ID</th>
<th>Name</th>
<th>Father</th>
<th>Mother</th>
<th>DOB</th>
<th>Apply Date</th>
<th>Post</th>
</tr>

</table>

<script>

fetch("PASTE_SCRIPT_URL_HERE")

.then(res=>res.json())

.then(data=>{

let table=document.getElementById("table");

data.forEach(row=>{

let tr=document.createElement("tr");

tr.innerHTML=`

<td>${row[0]}</td>
<td>${row[1]}</td>
<td>${row[2]}</td>
<td>${row[3]}</td>
<td>${row[4]}</td>
<td>${row[5]}</td>
<td>${row[6]}</td>

`;

table.appendChild(tr);

});

});

</script>

</body>
</html>
