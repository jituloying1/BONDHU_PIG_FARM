<!DOCTYPE html>
<html>
<head>
<title>ABC School Data Store</title>

<style>

body{font-family:Arial;background:#f2f2f2;padding:40px;}

table{
border-collapse:collapse;
width:100%;
background:white;
}

th,td{
border:1px solid #ddd;
padding:8px;
text-align:center;
}

th{
background:#007BFF;
color:white;
}

img{
width:50px;
height:50px;
}

button{
padding:8px;
margin:3px;
}

</style>

<script>

let users=[];

function loadData(){

users=JSON.parse(localStorage.getItem("users"))||[];

let table="";

users.forEach((u,index)=>{

table+=`

<tr>

<td>${u.appID}</td>
<td>${u.name}</td>
<td>${u.father}</td>
<td>${u.mother}</td>
<td>${u.post}</td>
<td>${u.applydate}</td>

<td><img src="${u.photo}"></td>
<td><img src="${u.signature}"></td>

<td><a href="${u.marksheet}" target="_blank">View</a></td>
<td><a href="${u.birth}" target="_blank">View</a></td>
<td><a href="${u.admit}" target="_blank">View</a></td>

</tr>

`;

});

document.getElementById("data").innerHTML=table;

}

function downloadExcel(){

let csv="AppID,Name,Father,Mother,Post,Date,Photo,Signature,Marksheet,Birth,Admit\n";

users.forEach(u=>{

csv+=`${u.appID},${u.name},${u.father},${u.mother},${u.post},${u.applydate},${u.photo},${u.signature},${u.marksheet},${u.birth},${u.admit}\n`;

});

let blob=new Blob([csv],{type:"text/csv"});
let a=document.createElement("a");

a.href=URL.createObjectURL(blob);
a.download="ABC_School_Data.csv";
a.click();

}

</script>

</head>

<body onload="loadData()">

<h2>ABC School Applicant Data Store</h2>

<button onclick="downloadExcel()">Download Excel</button>

<table>

<tr>

<th>App ID</th>
<th>Name</th>
<th>Father</th>
<th>Mother</th>
<th>Post</th>
<th>Date</th>
<th>Photo</th>
<th>Signature</th>
<th>Marksheet</th>
<th>Birth</th>
<th>Admit</th>

</tr>

<tbody id="data"></tbody>

</table>

</body>
</html>
