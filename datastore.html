<!DOCTYPE html>
<html>
<head>
<title>ABC School Data Store</title>

<style>

body{
font-family:Arial;
background:#f2f2f2;
padding:40px;
}

table{
border-collapse:collapse;
width:100%;
background:white;
}

th,td{
border:1px solid #ddd;
padding:8px;
text-align:center;
}

th{
background:#007BFF;
color:white;
}

button{
padding:10px;
background:green;
color:white;
border:none;
cursor:pointer;
margin-bottom:20px;
}

</style>

<script>

function loadData(){

let users = JSON.parse(localStorage.getItem("users")) || [];

let table="";

users.forEach(function(user){

table+=`
<tr>
<td>${user.appID}</td>
<td>${user.name}</td>
<td>${user.father}</td>
<td>${user.mother}</td>
<td>${user.dob}</td>
<td>${user.post}</td>
<td>${user.applydate}</td>
</tr>
`;

});

document.getElementById("tabledata").innerHTML=table;

}

function downloadExcel(){

let users = JSON.parse(localStorage.getItem("users")) || [];

let csv="ApplicationID,Name,Father,Mother,DOB,Post,ApplyDate\n";

users.forEach(function(u){

csv+=`${u.appID},${u.name},${u.father},${u.mother},${u.dob},${u.post},${u.applydate}\n`;

});

let blob = new Blob([csv],{type:"text/csv"});

let a=document.createElement("a");

a.href=URL.createObjectURL(blob);

a.download="ABC_School_Applicants.csv";

a.click();

}

</script>

</head>

<body onload="loadData()">

<h2>ABC School Applicant Data Store</h2>

<button onclick="downloadExcel()">Download Excel</button>

<table>

<tr>
<th>Application ID</th>
<th>Name</th>
<th>Father</th>
<th>Mother</th>
<th>DOB</th>
<th>Post Applied</th>
<th>Apply Date</th>
</tr>

<tbody id="tabledata"></tbody>

</table>

</body>
</html>
