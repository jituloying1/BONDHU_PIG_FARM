<!DOCTYPE html>
<html>
<head>
<title>ABC School Data Store</title>
<style>
body{font-family:Arial;background:#f2f2f2;padding:40px;}
table{border-collapse:collapse;width:100%;background:white;}
th,td{border:1px solid #ddd;padding:8px;text-align:center;}
th{background:#007BFF;color:white;}
img{width:50px;height:50px;}
button{padding:6px 10px;margin:3px;cursor:pointer;border:none;border-radius:4px;}
button.edit{background:#007BFF;color:white;}
button.delete{background:#b30000;color:white;}
button.download{background:#28a745;color:white;}
input#search{padding:8px;width:250px;margin-bottom:15px;border-radius:4px;border:1px solid #ccc;}
.highlight{background:yellow;}
</style>
</head>
<body onload="loadData()">

<h2>ABC School Applicant Data Store</h2>

<!-- Search Box -->
<input type="text" id="search" placeholder="Search by AppID, Name, or DOB" onkeyup="searchData()">

<button class="download" onclick="downloadExcel()">Download Excel</button>
<button class="delete" onclick="deleteAll()">Delete All Data</button>
<br><br>

<table>
<tr>
<th>App ID</th>
<th>Name</th>
<th>Father</th>
<th>Mother</th>
<th>Date of Birth</th> <!-- Added header -->
<th>Post</th>
<th>Date</th>
<th>Photo</th>
<th>Signature</th>
<th>Marksheet</th>
<th>Birth</th>
<th>Admit</th>
<th>Actions</th>
</tr>
<tbody id="data"></tbody>
</table>

<script>
let users = [];

function loadData(){
  users = JSON.parse(localStorage.getItem("users")) || [];
  displayData(users);
}

function displayData(dataArray){
  let table = "";
  dataArray.forEach((u,index)=>{
    table+=`
<tr>
<td>${u.appID}</td>
<td>${u.name}</td>
<td>${u.father}</td>
<td>${u.mother}</td>
<td>${u.dob}</td> <!-- Display DOB -->
<td>${u.post}</td>
<td>${u.applydate}</td>
<td>${u.photo ? '<img src="'+u.photo+'">' : ''}</td>
<td>${u.signature ? '<img src="'+u.signature+'">' : ''}</td>
<td>${u.marksheet ? '<a href="'+u.marksheet+'" target="_blank">View</a>' : ''}</td>
<td>${u.birth ? '<a href="'+u.birth+'" target="_blank">View</a>' : ''}</td>
<td>${u.admit ? '<a href="'+u.admit+'" target="_blank">View</a>' : ''}</td>
<td>
  <button class="edit" onclick="editUser(${index})">Edit</button>
  <button class="delete" onclick="deleteUser(${index})">Delete</button>
</td>
</tr>
`;
  });
  document.getElementById("data").innerHTML = table;
}

function editUser(index){
  localStorage.setItem("editIndex", index);
  window.location.href = "edit.html"; // redirect to edit page
}

function deleteUser(index){
  if(confirm("Are you sure you want to delete this record?")){
    users.splice(index, 1);
    localStorage.setItem("users", JSON.stringify(users));
    loadData();
  }
}

function deleteAll(){
  if(confirm("Are you sure you want to delete ALL records?")){
    localStorage.removeItem("users");
    loadData();
  }
}

function downloadExcel(){
  if(users.length === 0){
    alert("No data to download!");
    return;
  }
  let csv = "AppID,Name,Father,Mother,DOB,Post,Date,Photo,Signature,Marksheet,Birth,Admit\n";
  users.forEach(u=>{
    csv += `"${u.appID}","${u.name}","${u.father}","${u.mother}","${u.dob}","${u.post}","${u.applydate}","${u.photo}","${u.signature}","${u.marksheet}","${u.birth}","${u.admit}"\n`;
  });
  let blob = new Blob([csv],{type:"text/csv"});
  let a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "ABC_School_Data.csv";
  a.click();
}

// Search Function
function searchData(){
  let input = document.getElementById("search").value.toLowerCase();
  let filtered = users.filter(u => 
    u.appID.toLowerCase().includes(input) ||
    u.name.toLowerCase().includes(input) ||
    u.dob.toLowerCase().includes(input)
  );
  displayData(filtered);
}
</script>

</body>
</html>
