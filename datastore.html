<!DOCTYPE html>
<html>
<head>
<title>ABC School Data Store</title>

<style>

body{
font-family:Arial;
background:#f2f2f2;
padding:40px;
}

table{
border-collapse:collapse;
width:100%;
background:white;
}

th,td{
border:1px solid #ddd;
padding:8px;
text-align:center;
}

th{
background:#007BFF;
color:white;
}

button{
padding:8px;
margin:3px;
}

</style>

<script>

let users=[];

function loadData(){

users = JSON.parse(localStorage.getItem("users")) || [];

let table="";

users.forEach((u,index)=>{

table+=`

<tr>

<td>${u.appID}</td>
<td contenteditable="true">${u.name}</td>
<td contenteditable="true">${u.father}</td>
<td contenteditable="true">${u.mother}</td>
<td>${u.post}</td>
<td>${u.applydate}</td>

<td>
<a href="${u.marksheet}" target="_blank">View</a>
</td>

<td>
<button onclick="saveEdit(${index},this)">Save</button>
</td>

</tr>

`;

});

document.getElementById("data").innerHTML=table;

}

function saveEdit(index,btn){

let row = btn.parentNode.parentNode;

users[index].name=row.cells[1].innerText;
users[index].father=row.cells[2].innerText;
users[index].mother=row.cells[3].innerText;

localStorage.setItem("users",JSON.stringify(users));

alert("Data Updated");

}

function downloadExcel(){

let csv="AppID,Name,Father,Mother,Post,ApplyDate,MarksheetURL\n";

users.forEach(u=>{

csv+=`${u.appID},${u.name},${u.father},${u.mother},${u.post},${u.applydate},${u.marksheet}\n`;

});

let blob=new Blob([csv],{type:"text/csv"});

let a=document.createElement("a");

a.href=URL.createObjectURL(blob);

a.download="ABC_School_Data.csv";

a.click();

}

</script>

</head>

<body onload="loadData()">

<h2>ABC School Applicant Data Store</h2>

<button onclick="downloadExcel()">Download Excel</button>

<table>

<tr>

<th>App ID</th>
<th>Name</th>
<th>Father</th>
<th>Mother</th>
<th>Post</th>
<th>Date</th>
<th>Marksheet</th>
<th>Edit</th>

</tr>

<tbody id="data"></tbody>

</table>

</body>
</html>
